name: Example Template Release

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      release-description:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Release Description'
        # Default value if no value is explicitly provided
        default: 'Default Value'
        # Input has to be provided for the workflow to run
        required: false
        # The data type of the input
        type: string
      release-tag:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Release Tag'
        # Default value if no value is explicitly provided
        default: 'V.0.0.0'
        # Input has to be provided for the workflow to run
        required: false
        # The data type of the input
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: setup proper python for the thing
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install python dependencies to build local version of webserver binary
        run: |
          cd ./Telemetry-Python-Webserver
          python -m pip install -r requirements.txt
          pyinstaller --add-data="test_data\test-flight-2026-March-modified.csv:./test_data"  --onefile -n webserver_proc-x86_64-pc-windows-msvc webserver.py
          cd dist
          copy ".\webserver_proc-x86_64-pc-windows-msvc.exe" ".\../../Main-Tauri-Application/src-tauri/binaries"
          cd ../../

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: |
          cd ./Main-Tauri-Application
          npm install # change this to npm, pnpm or bun depending on which one you use.

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          uploadPlainBinary: true
          args: ${{ matrix.args }}