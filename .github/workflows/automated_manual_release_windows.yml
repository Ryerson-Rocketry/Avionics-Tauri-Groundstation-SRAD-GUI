name: Manual Release

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      release-description:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Release Description'
        # Default value if no value is explicitly provided
        default: 'Default Value'
        # Input has to be provided for the workflow to run
        required: false
        # The data type of the input
        type: string
      release-tag:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Release Tag'
        # Default value if no value is explicitly provided
        default: 'V.0.0.0'
        # Input has to be provided for the workflow to run
        required: false
        # The data type of the input
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: setup proper python for the thing
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install python dependencies to build local version of webserver binary (LINUX UBUNTU)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          cd ./Telemetry-Python-Webserver
          python -m pip install -r requirements.txt
          pyinstaller --add-data="test_data/test-flight-2026-March-modified.csv:./test_data"  --onefile -n webserver_proc-x86_64-unknown-linux-gnu webserver.py
          cd dist
          cp "webserver_proc-x86_64-unknown-linux-gnu" ./../../Main-Tauri-Application/src-tauri/binaries
          cd ../../

      - name: install python dependencies to build local version of webserver binary (WINDOWS)
        if: matrix.platform == 'windows-latest' # This must match the platform value defined above.
        run: |
          cd ./Telemetry-Python-Webserver
          python -m pip install -r requirements.txt
          pyinstaller --add-data="test_data\test-flight-2026-March-modified.csv:./test_data"  --onefile -n webserver_proc-x86_64-pc-windows-msvc webserver.py
          cd dist
          copy ".\webserver_proc-x86_64-pc-windows-msvc.exe" ".\../../Main-Tauri-Application/src-tauri/binaries"
          cd ../../

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies 
        run: |
          cd ./Main-Tauri-Application
          npm install # change this to npm, pnpm or bun depending on which one you use.

      - name: build and copy to build folder (windows)
        if: matrix.platform == 'windows-latest'  # This must match the platform value defined above.
        run: | 
          cd ./Main-Tauri-Application
          npm run tauri build
          robocopy ".\src-tauri\target\release" ".\../_BUILD/" /MIR
          if ($lastexitcode -lt 8) { $global:LASTEXITCODE = $null }
          cd ..
          Compress-Archive ./_BUILD ./build.zip

      - name: create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.event.inputs.release-tag }}
          release_name: ${{ github.event.inputs.release-tag }}
          body: |
            ${{ github.event.inputs.release-description }}

            Release Generated by github action script
          draft: true
          prerelease: false

      - name: Upload Release Asset (linux)
        if: matrix.platform == 'ubuntu-22.04'  # This must match the platform value defined above.
        id: upload-release-asset-linux
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: build.tar.gz
          asset_name: build.tar.gz
          asset_content_type: application/gzip

      - name: Upload Release Asset (windows)
        if: matrix.platform == 'windows-latest'  # This must match the platform value defined above.
        id: upload-release-asset-windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: build.zip
          asset_name: build.zip
          asset_content_type: application/zip